<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新店區空氣品質分析儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: "Microsoft JhengHei", sans-serif; }
        .chart-container { position: relative; width: 100%; height: 300px; }
        .main-chart-container { position: relative; width: 100%; height: 450px; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto grid grid-cols-12 gap-6">
        
        <div class="col-span-12 lg:col-span-4 flex flex-col gap-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex-1">
                <h3 id="attainTitle" class="text-gray-500 text-sm font-bold mb-2">三年平均 PM2.5 達標率</h3>
                <div id="bigNumber" class="text-6xl font-black transition-colors duration-500">--%</div>
                <div id="alertText" class="mt-4 px-3 py-2 rounded-lg font-bold text-center">計算中...</div>
                <div id="guideBox" class="mt-4 p-3 bg-gray-50 rounded-lg text-sm text-gray-600 border-l-4 border-gray-300">
                    載入指引資訊中...
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex-1">
                <h3 class="text-gray-700 font-bold mb-4 text-center">優質天數佔比</h3>
                <div class="chart-container" style="height: 250px;">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-8 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <h3 id="mainTitle" class="text-xl font-bold text-gray-800">2023-2025 PM2.5 趨勢總覽 (三年平均)</h3>
                        <p class="text-sm text-gray-400">使用下拉選單篩選特定年份資料</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <select id="yearFilter" class="border rounded px-3 py-1 text-sm bg-blue-50 border-blue-200 font-bold text-blue-700">
                            <option value="all">顯示三年平均</option>
                            <option value="2025">2025 年度</option>
                            <option value="2024">2024 年度</option>
                            <option value="2023">2023 年度</option>
                        </select>
                        <span class="text-xs text-gray-400 font-bold">單位：µg/m³</span>
                    </div>
                </div>
                
                <div class="main-chart-container">
                    <canvas id="lineChart"></canvas>
                </div>

                <hr class="my-8">

                <h4 id="barTitle" class="text-center font-bold text-gray-600 mb-4">月份平均濃度分布 (2023-2025)</h4>
                <div style="height: 250px;">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 text-center">
                <p class="text-sm text-gray-400">閱聽人對象：新店遊客、減汙研究人員、房地產投資者</p>
            </div>
        </div>
    </div>

    <script>
        const rawData = {
            "2025": [18.2, 16.5, 14.1, 11.2, 9.8, 10.5, 12.1, 11.8, 13.5, 15.2, 17.8, 19.1],
            "2024": [20.1, 18.2, 15.5, 12.8, 11.2, 12.5, 13.8, 13.2, 14.5, 16.8, 19.5, 21.2],
            "2023": [22.5, 20.8, 18.2, 15.1, 13.5, 14.2, 15.8, 15.1, 16.5, 18.2, 21.5, 23.8]
        };

        const monthLabels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        
        // 計算三年平均
        const avgData = monthLabels.map((_, i) => {
            return parseFloat(((rawData["2023"][i] + rawData["2024"][i] + rawData["2025"][i]) / 3).toFixed(1));
        });

        let lineChart, pieChart, barChart;

        function updateDashboard(filter) {
            let currentData, titleSuffix, attainRate;
            
            if (filter === 'all') {
                currentData = avgData;
                titleSuffix = "(三年平均)";
                attainRate = 78; // 假設的三年總平均達標率
                document.getElementById('attainTitle').innerText = "三年平均 PM2.5 達標率";
            } else {
                currentData = rawData[filter];
                titleSuffix = `(${filter}年度)`;
                attainRate = filter === "2025" ? 85 : (filter === "2024" ? 78 : 72);
                document.getElementById('attainTitle').innerText = `${filter}年度 PM2.5 達標率`;
            }

            const avgPM = (currentData.reduce((a, b) => a + b, 0) / 12).toFixed(1);

            // 更新介面文字
            document.getElementById('mainTitle').innerText = `PM2.5 趨勢總覽 ${titleSuffix}`;
            document.getElementById('barTitle').innerText = `月份平均濃度分布 ${titleSuffix}`;
            updateBigNumber(attainRate);
            updateAlert(avgPM);

            // 更新圖表
            lineChart.data.datasets[0].label = `PM2.5 濃度 ${titleSuffix}`;
            lineChart.data.datasets[0].data = currentData;
            lineChart.update();

            barChart.data.datasets[0].data = currentData;
            barChart.update();

            pieChart.data.datasets[0].data = [attainRate, 100 - attainRate];
            pieChart.update();
        }

        function updateBigNumber(rate) {
            const el = document.getElementById('bigNumber');
            el.innerText = rate + '%';
            el.style.color = rate >= 80 ? '#22c55e' : (rate >= 60 ? '#eab308' : '#ef4444');
        }

        function updateAlert(pm) {
            const alertEl = document.getElementById('alertText');
            const guideEl = document.getElementById('guideBox');
            if (pm <= 15.4) {
                alertEl.innerText = "良好";
                alertEl.className = "mt-4 px-3 py-2 rounded-lg font-bold text-center bg-green-100 text-green-800";
                guideEl.innerText = "✅ 優良 (0-15)：空氣品質良好。";
            } else {
                alertEl.innerText = "普通";
                alertEl.className = "mt-4 px-3 py-2 rounded-lg font-bold text-center bg-yellow-100 text-yellow-800";
                guideEl.innerText = "⚠ 提醒 (16-35)：敏感族群注意。";
            }
        }

        window.onload = function() {
            // 曲線圖
            lineChart = new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: {
                    labels: monthLabels,
                    datasets: [{
                        data: avgData,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });

            // 月份長條圖
            barChart = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: monthLabels,
                    datasets: [{
                        data: avgData,
                        backgroundColor: '#94a3b8',
                        borderRadius: 4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false } },
                        y: { beginAtZero: true }
                    }
                }
            });

            // 圓餅圖
            pieChart = new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: {
                    labels: ['良好', '普通以下'],
                    datasets: [{ data: [78, 22], backgroundColor: ['#22c55e', '#ef4444'] }]
                },
                options: { maintainAspectRatio: false }
            });

            document.getElementById('yearFilter').addEventListener('change', (e) => {
                updateDashboard(e.target.value);
            });

            updateDashboard("all");
        };
    </script>
</body>
</html>
