<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新店區空氣品質分析儀表板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: "Microsoft JhengHei", sans-serif; overflow-x: hidden; }
        .chart-container { position: relative; width: 100%; height: 180px; }
        .main-chart-container { position: relative; width: 100%; height: 320px; }
        .bar-chart-container { position: relative; width: 100%; height: 180px; }
    </style>
</head>
<body class="p-4 lg:p-6">
    <div class="max-w-7xl mx-auto grid grid-cols-12 gap-4">
        
        <div class="col-span-12 lg:col-span-3 flex flex-col gap-4">
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 id="attainTitle" class="text-gray-500 text-xs font-bold mb-1">PM2.5 達標率</h3>
                <div id="bigNumber" class="text-5xl font-black transition-all duration-300">--%</div>
                <div id="statusLabel" class="text-sm font-bold text-gray-400 mt-1">全年度平均</div>
                <div id="alertText" class="mt-3 px-2 py-1 rounded-lg font-bold text-sm text-center">計算中...</div>
                <div id="guideBox" class="mt-3 p-2 bg-gray-50 rounded-lg text-xs text-gray-500 border-l-4 border-gray-300">
                    載入中...
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 id="pieTitle" class="text-gray-700 text-sm font-bold mb-2 text-center">優質天數佔比</h3>
                <div class="chart-container">
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
            
            <div class="hidden lg:block bg-blue-50 p-3 rounded-xl border border-blue-100">
                <p class="text-[10px] text-blue-400 leading-tight">閱聽對象：新店遊客、減汙研究員、房產投資者</p>
            </div>
        </div>

        <div class="col-span-12 lg:col-span-9 space-y-4">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h3 id="mainTitle" class="text-lg font-bold text-gray-800">PM2.5 趨勢總覽 (三年平均)</h3>
                        <p class="text-xs text-gray-400">點擊長條圖可查看特定月份詳情</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <select id="yearFilter" class="border rounded px-2 py-1 text-xs bg-white border-gray-300 font-bold">
                            <option value="all">顯示三年平均</option>
                            <option value="2025">2025 年度</option>
                            <option value="2024">2024 年度</option>
                            <option value="2023">2023 年度</option>
                        </select>
                        <span class="text-[10px] text-gray-400 font-bold">µg/m³</span>
                    </div>
                </div>
                
                <div class="main-chart-container">
                    <canvas id="lineChart"></canvas>
                </div>

                <div class="my-4 border-t border-gray-50"></div>

                <h4 id="barTitle" class="text-center text-sm font-bold text-gray-500 mb-2">月份平均濃度分布 (三年平均)</h4>
                <div class="bar-chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const rawData = {
            "2025": [18.2, 16.5, 14.1, 11.2, 9.8, 10.5, 12.1, 11.8, 13.5, 15.2, 17.8, 19.1],
            "2024": [20.1, 18.2, 15.5, 12.8, 11.2, 12.5, 13.8, 13.2, 14.5, 16.8, 19.5, 21.2],
            "2023": [22.5, 20.8, 18.2, 15.1, 13.5, 14.2, 15.8, 15.1, 16.5, 18.2, 21.5, 23.8]
        };

        const monthLabels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        const avgData = monthLabels.map((_, i) => parseFloat(((rawData["2023"][i] + rawData["2024"][i] + rawData["2025"][i]) / 3).toFixed(1)));

        let lineChart, pieChart, barChart;
        let currentYear = 'all';

        function calculateAttainRate(pmValue) {
            if (pmValue <= 12) return 95;
            if (pmValue <= 15.4) return 85;
            if (pmValue <= 25) return 65;
            return 45;
        }

        // 更新左側面板與標題
        function updateSidePanel(pmValue, contextLabel) {
            const rate = calculateAttainRate(pmValue);
            const yearText = currentYear === 'all' ? "三年平均" : `${currentYear}年度`;
            
            // 更新達標率與圓餅圖標題
            document.getElementById('bigNumber').innerText = rate + '%';
            document.getElementById('statusLabel').innerText = contextLabel;
            document.getElementById('pieTitle').innerText = `${contextLabel} 優質佔比`;
            
            const el = document.getElementById('bigNumber');
            el.style.color = rate >= 85 ? '#22c55e' : (rate >= 70 ? '#eab308' : '#ef4444');

            const alertEl = document.getElementById('alertText');
            const guideEl = document.getElementById('guideBox');
            if (pmValue <= 15.4) {
                alertEl.innerText = "良好";
                alertEl.className = "mt-3 px-2 py-1 rounded-lg font-bold text-sm text-center bg-green-100 text-green-800";
                guideEl.innerText = "✅ 品質優良，適合戶外運動。";
            } else {
                alertEl.innerText = "普通";
                alertEl.className = "mt-3 px-2 py-1 rounded-lg font-bold text-sm text-center bg-yellow-100 text-yellow-800";
                guideEl.innerText = "⚠ 提醒 (16-35)：建議配戴口罩。";
            }

            pieChart.data.datasets[0].data = [rate, 100 - rate];
            pieChart.update();
        }

        function updateDashboard(year) {
            currentYear = year;
            const data = year === 'all' ? avgData : rawData[year];
            const titleSuffix = year === 'all' ? "(三年平均)" : `(${year}年度)`;
            
            // 更新所有圖表的動態標題
            document.getElementById('mainTitle').innerText = `PM2.5 趨勢總覽 ${titleSuffix}`;
            document.getElementById('attainTitle').innerText = year === 'all' ? "三年平均達標率" : `${year}年度達標率`;
            document.getElementById('barTitle').innerText = `月份平均濃度分布 ${titleSuffix}`;

            lineChart.data.datasets[0].data = data;
            lineChart.update();

            barChart.data.datasets[0].data = data;
            barChart.data.datasets[0].backgroundColor = data.map(() => '#cbd5e1');
            barChart.update();

            const yearAvg = (data.reduce((a, b) => a + b, 0) / 12).toFixed(1);
            updateSidePanel(yearAvg, year === 'all' ? "三年平均" : `${year}年度`);
        }

        window.onload = function() {
            lineChart = new Chart(document.getElementById('lineChart'), {
                type: 'line',
                data: {
                    labels: monthLabels,
                    datasets: [{
                        data: avgData,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.05)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true }, x: { grid: { display: false } } },
                    plugins: { legend: { display: false } }
                }
            });

            barChart = new Chart(document.getElementById('barChart'), {
                type: 'bar',
                data: {
                    labels: monthLabels,
                    datasets: [{
                        data: avgData,
                        backgroundColor: '#cbd5e1',
                        hoverBackgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false } }, y: { beginAtZero: true } },
                    onClick: (e, elements) => {
                        if (elements.length > 0) {
                            const index = elements[0].index;
                            const monthData = barChart.data.datasets[0].data[index];
                            barChart.data.datasets[0].backgroundColor = barChart.data.datasets[0].data.map((_, i) => i === index ? '#3b82f6' : '#cbd5e1');
                            barChart.update();
                            
                            // 點擊月份時，更新圓餅圖與標籤為該月份
                            const monthName = monthLabels[index];
                            updateSidePanel(monthData, monthName);
                        }
                    }
                }
            });

            pieChart = new Chart(document.getElementById('pieChart'), {
                type: 'pie',
                data: {
                    labels: ['良好', '普通以下'],
                    datasets: [{ data: [78, 22], backgroundColor: ['#22c55e', '#ef4444'], borderWidth: 0 }]
                },
                options: { 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 10 } } } }
                }
            });

            document.getElementById('yearFilter').addEventListener('change', (e) => {
                updateDashboard(e.target.value);
            });

            updateDashboard("all");
        };
    </script>
</body>
</html>
